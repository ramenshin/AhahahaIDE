appId: com.ramenshin.ahahahaide
productName: AhahahaIDE
copyright: Copyright © 2026 ramenshin

# node-gyp가 VS 2026(v18)을 인식 못해 rebuild 실패 → node-pty의 prebuilt(.node) 그대로 사용.
# Phase 2-B에서 dev 환경도 같은 이유로 postinstall 제거함. 자세한 내용: project_phase_status 메모 참조.
npmRebuild: false

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

# 네이티브 모듈의 prebuilt 바이너리는 asar 안에서 로드할 수 없으므로 언팩.
asarUnpack:
  - '**/node_modules/node-pty/**/*'

win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-portable.${ext}

portable:
  artifactName: ${productName}-${version}-portable.${ext}
