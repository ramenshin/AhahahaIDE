appId: com.ramenshin.ahahahaide
productName: AhahahaIDE
copyright: Copyright © 2026 ramenshin

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-portable.${ext}

portable:
  artifactName: ${productName}-${version}-portable.${ext}
